name: Supervisor Auto-Fix + Jules Trigger

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run supervisor auto-fix
        run: python3 supervisor.py --fix || true

      - name: Compile pending raw logs
        run: python3 compile.py --no-git || true

      - name: Rebuild index
        run: python3 -c "from compile import rebuild_index; rebuild_index()" || true

      - name: Commit if changed
        run: |
          git config user.name "Supervisor-Bot"
          git config user.email "supervisor[bot]@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "[Supervisor] hourly auto-fix + compile" && git push origin main)

      - name: Create Jules task if issues remain
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read supervisor report
            let report = 'No report';
            try { report = fs.readFileSync('supervisor_report.md', 'utf8'); } catch(e) {}
            
            // Read JSON result
            let issues = [];
            try {
              const result = JSON.parse(fs.readFileSync('supervisor_result.json', 'utf8'));
              issues = result.issues || [];
            } catch(e) {}
            
            const errors = issues.filter(i => i.severity === 'error');
            const warns = issues.filter(i => i.severity === 'warn');
            
            if (errors.length === 0 && warns.length === 0) {
              core.summary.addRaw('✅ All checks passed — no Jules task needed');
              return;
            }
            
            const label = errors.length > 0 ? '🔴' : '🟡';
            let body = `## Jules Health Check — ${new Date().toISOString().slice(0,10)}\n\n`;
            body += `**Errors:** ${errors.length} | **Warnings:** ${warns.length}\n\n`;
            body += '---\n\n';
            body += report;
            body += '\n\n---\n\n';
            body += '## Tasks for Jules\n';
            body += '- [ ] Read `GEMINI.md` for full instructions\n';
            body += '- [ ] Run `python3 supervisor.py --fix`\n';
            body += '- [ ] Check `wiki/errors/` — mark fixed errors as ✅ ИСПРАВЛЕНО\n';
            body += '- [ ] Check `wiki/skills/` — mark outdated as ⚠️ УСТАРЕЛО\n';
            body += '- [ ] Update `shared_status.md` if stale\n';
            body += '- [ ] Commit and push\n';
            body += '- [ ] Close this issue when done\n';
            body += '\n> If unsure about anything — ask the user in the chat.\n';
            
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${label} Jules: ${errors.length} error(s), ${warns.length} warning(s) — ${new Date().toISOString().slice(0,10)}`,
              body: body,
              labels: ['jules-task', 'supervisor']
            });
            console.log(`Created issue #${issue.number} for Jules`);
            core.summary.addRaw(`Created issue #${issue.number} for Jules`);

      - name: Summary
        if: always()
        run: cat $GITHUB_STEP_SUMMARY 2>/dev/null || echo "✅ Supervisor auto-fix completed" >> $GITHUB_STEP_SUMMARY
